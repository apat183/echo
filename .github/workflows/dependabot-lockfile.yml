name: Dependabot lockfile

# Dependabot updates package.json but never bun.lock, which then fails
# `bun install --frozen-lockfile`. Regenerate bun.lock on Dependabot's PRs and
# commit it back so the branch — and main after merge — installs cleanly.
# (Cargo.lock and GitHub Actions PRs need nothing here; bun install is a no-op
# when package.json is unchanged, so the commit step simply skips them.)

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bun-lockfile:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Regenerate bun.lock
        run: bun install --lockfile-only

      - name: Commit refreshed lockfile
        run: |
          if [ -z "$(git status --porcelain bun.lock)" ]; then
            echo "bun.lock already in sync — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "Sync bun.lock with package.json"
          git push

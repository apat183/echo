name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: macos-latest
    # Force every cargo/rustfmt/clippy call onto the pinned toolchain. The runner
    # otherwise resolves a newer ambient rustfmt than the one installed below,
    # which reformats unchanged code and breaks `cargo fmt --check`. Single source
    # of truth for the version — the Setup Rust step reads it too.
    env:
      RUSTUP_TOOLCHAIN: "1.97.0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUSTUP_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        # Dependabot bumps package.json but not bun.lock, so a frozen install
        # fails on its PRs. Regenerate for those (the dependabot-lockfile workflow
        # commits the refreshed bun.lock back); stay frozen everywhere else.
        run: bun install ${{ github.event.pull_request.user.login == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Run frontend tests with coverage
        run: bun run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: coverage
          if-no-files-found: ignore

      - name: Build frontend
        run: bun run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: |
          cargo fmt --version
          cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare_release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: |
            Automated unsigned Echo build for this commit.

            Downloads are ad-hoc signed and not notarized, so macOS may require manual approval before first launch.
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          release_tag="build-${short_sha}"
          release_name="Echo ${release_tag}"

          git fetch --tags origin

          if git rev-parse "${release_tag}^{commit}" >/dev/null 2>&1; then
            tagged_sha="$(git rev-parse "${release_tag}^{commit}")"
            if [ "$tagged_sha" != "$GITHUB_SHA" ]; then
              echo "Tag ${release_tag} already points to ${tagged_sha}, not ${GITHUB_SHA}."
              exit 1
            fi
          else
            git tag "$release_tag" "$GITHUB_SHA"
            git push origin "refs/tags/${release_tag}"
          fi

          # Create/refresh the release as a DRAFT. The publish_release job
          # promotes it to published + latest only after both DMGs upload, so a
          # failed or partial build never leaves an empty "latest" release. The
          # edit path intentionally leaves draft/latest state untouched (a re-run
          # over an already-published release must not un-publish it).
          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release edit "$release_tag" \
              --title "$release_name" \
              --notes "$RELEASE_NOTES"
          else
            gh release create "$release_tag" \
              --verify-tag \
              --draft \
              --title "$release_name" \
              --notes "$RELEASE_NOTES"
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  macos:
    name: Build macOS ${{ matrix.target }}
    needs: prepare_release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build DMG
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: bun run tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          dmgs=()
          while IFS= read -r dmg; do
            dmgs+=("$dmg")
          done < <(find src-tauri/target -path "*/bundle/dmg/*.dmg" -type f -print | sort)

          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "No DMG files found for ${TARGET}."
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${dmgs[@]}" --clobber

  publish_release:
    name: Publish GitHub Release
    # Runs only if every macos matrix leg succeeded (fail-fast: false means a
    # single failed arch fails this job, so publish is skipped and the release
    # stays a draft with whatever uploaded — never a broken public "latest").
    needs: [prepare_release, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Promote draft to latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: |
          set -euo pipefail

          gh release edit "$RELEASE_TAG" \
            --draft=false \
            --prerelease=false \
            --latest

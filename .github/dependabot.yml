version: 2
updates:
  # Frontend JS/TS dependencies (Bun's bun.lock is read via the npm ecosystem).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Vite and its React plugin move in lockstep — @vitejs/plugin-react 6
      # imports vite's internal exports, so it only builds against vite 8. Group
      # the whole Vite/Vitest toolchain (majors included) into one PR so coupled
      # bumps land together instead of as individually-broken PRs.
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust crate for the Tauri backend.
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
